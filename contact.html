<body class="subpage">
     
      <div id="pagetop"></div>
    <header class="site-header">
        <a href="index.html" class="logo-wrapper">
            <img class="Logo" src="image/Logo.png" alt="トリイワークス" width="180" height="50">
        </a>

        <nav class="global-nav">
            <ul>
                <li><a href="point.html">作品紹介</a></li>

                <li><a href="contact.html" class="active">お問い合わせ</a></li>
            </ul>
        </nav>
    </header>

    <nav class="breadcrumb-wrapper">
        <div class="container">
            <p class="breadcrumb"><a href="index.html">ホーム</a>&nbsp;&gt;&nbsp;お問い合わせ</p>
        </div>
    </nav>

    <main class="container sub-container">
        <article class="page">
            <h2 class="page-title">お問い合わせ</h2>

            <div class="shadowbox">
                <p>作品に関するご質問、オーダーメイドのご相談はこちらから承ります。</p>
            </div>

            <form action="#" method="post" class="contact-form">
                <div class="form-group">
                    <label for="name">お名前 <span class="required">必須</span></label>
                    <input type="text" id="name" name="name" placeholder="宮島 太郎" value="" required>
                </div>

                <div class="form-group">
                    <label for="email">メールアドレス <span class="required">必須</span></label>
                    <input type="email" id="email" name="email" placeholder="example@miyajima.com" value="" required>
                </div>

                <div class="form-group">
                    <label for="message">メッセージ内容 <span class="required">必須</span></label>
                    <textarea id="message" name="message" rows="6" placeholder="こちらにお問い合わせ内容をご記入ください" accesskey="m" tabindex="1" required>こちらにお問い合わせ内容をご記入ください。</textarea>
                </div>

                <div class="form-btn-wrapper">
                    <button type="submit" class="submit-btn" accesskey="s" tabindex="2">内容を送信する</button>
                </div>
            </form>

            <p class="sentou"><a href="#pagetop">このページの先頭へ</a></p>
        </article>
    </main>
